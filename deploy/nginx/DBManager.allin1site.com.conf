# DBManager.allin1site.com — proxy to Next.js container on 127.0.0.1:9230
# Pattern follows allin1site.com.conf (CF Full SSL → nginx self-signed → upstream).

server {
    listen 80;
    listen [::]:80;
    server_name DBManager.allin1site.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DBManager.allin1site.com;

    ssl_certificate     /etc/ssl/certs/dbmanager.pem;
    ssl_certificate_key /etc/ssl/private/dbmanager.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Inherit real client IP from Cloudflare (snippet shared with allin1site.com.conf).
    include /etc/nginx/snippets/cloudflare-realip.conf;

    client_max_body_size 1M;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    access_log /var/log/nginx/dbmanager.access.log;
    error_log  /var/log/nginx/dbmanager.error.log;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:9230;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:9230;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_cache_bypass                 $http_upgrade;
    }
}
