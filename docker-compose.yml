# DatabaseManager — runs on a SHARED Docker host (alongside other apps).
#
# Defaults:
#   - Container binds to 127.0.0.1:${HOST_PORT:-9230} → only the local reverse
#     proxy (nginx / NPM / Caddy on the host) can reach it. Nothing exposed to
#     the public internet directly.
#   - Image name + container name are namespaced so they don't collide.
#   - Resource limits set so a runaway app can't starve the box.
#
# Public hostname:   DBManager.allin1site.com  (TLS terminated at shared proxy)
# Upstream port:     127.0.0.1:9230 → container:3000  (host nginx vhost proxy_pass)
#
# If your shared proxy is Traefik (Docker container on a shared network) instead
# of nginx-on-host, uncomment the `labels:` and `networks:` blocks and remove
# the `ports:` line — see README.md "Shared server deploy" section.

services:
  app:
    image: dbmanager:latest
    container_name: dbmanager-app
    build:
      context: ./SecureConnect
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "127.0.0.1:${HOST_PORT:-9230}:3000"
    environment:
      # Shared state backend (rate-limit, confirm-tokens, encrypted connection
      # records). Lets the app survive restarts + scale horizontally.
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - dbmanager_data:/data
      - ./SecureConnect/.env.production:/app/.env.production:ro
    command: sh -c 'set -a && . /app/.env.production && set +a && node server.js'
    healthcheck:
      # GET (not HEAD) — Next.js /api/health only exports GET so HEAD would 405.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "--tries=1", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

    # ----- Traefik (uncomment if shared proxy is Traefik) -----
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=proxy"
    #   - "traefik.http.routers.dbmanager.rule=Host(`DBManager.allin1site.com`)"
    #   - "traefik.http.routers.dbmanager.entrypoints=websecure"
    #   - "traefik.http.routers.dbmanager.tls=true"
    #   - "traefik.http.routers.dbmanager.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.dbmanager.loadbalancer.server.port=3000"
    # networks:
    #   - default
    #   - proxy

  # Shared-state store. Not published to host (internal compose network only).
  redis:
    image: redis:7-alpine
    container_name: dbmanager-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "volatile-ttl"]
    volumes:
      - dbmanager_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 192M

volumes:
  dbmanager_data:
    # Persists encrypted saved-connection profiles under /data/saved-connections.json
    # (file owned by container's `nextjs` user, mode 600).
  dbmanager_redis:
    # Redis AOF — encrypted connection records + tokens survive redis restart.

